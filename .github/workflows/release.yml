name: Release



on:

  release:

    types: [published]



permissions:

  contents: write

  packages: write



jobs:

  release:

    runs-on: ubuntu-latest



    steps:

      - name: Checkout release tag

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

          ref: ${{ github.event.release.tag_name }}



      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 24

          cache: npm

          registry-url: https://npm.pkg.github.com



      - name: Parse release version

        id: version

        run: |

          TAG="${{ github.event.release.tag_name }}"

          VERSION="${TAG#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then

            echo "Invalid release tag: $TAG (expected vX.Y.Z)"

            exit 1

          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"



      - name: Install root dependencies

        run: npm ci



      - name: Promote changelog entries

        run: npm run release:promote -- --version ${{ steps.version.outputs.version }}



      - name: Sync conversion package versions

        env:

          RELEASE_VERSION: ${{ steps.version.outputs.version }}

        run: |

          node .cursor/skills/harmony-conversion/scripts/sync_conversion_versions.mjs --all --release-version ${{ steps.version.outputs.version }}



      - name: Commit release updates to main

        run: |

          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"



          git add package.json CHANGELOG.md changelog-data/ conversions/

          if git diff --staged --quiet; then

            echo "No release promotion changes to commit"

          else

            git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"

            git push origin HEAD:main

          fi



      - name: Move release tag to promotion commit

        run: |

          git tag -fa "${{ github.event.release.tag_name }}" -m "Release v${{ steps.version.outputs.version }}"

          git push origin "${{ github.event.release.tag_name }}" --force



      - name: Build docs site

        env:

          RELEASE_VERSION: ${{ steps.version.outputs.version }}

          GITHUB_REF_NAME: main

          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        run: npm run build



      - name: Build and publish conversion packages

        env:

          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |

          for dir in conversions/*/; do

            if [ -f "${dir}package.json" ] && [ -f "${dir}conversion.manifest.json" ]; then

              echo "Building ${dir}"

              npm ci --prefix "$dir"

              npm run build:lib --prefix "$dir"

              npm publish --prefix "$dir"

            fi

          done



      - name: Publish root Harmony package

        env:

          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: npm publish



      - name: Upload release asset

        uses: softprops/action-gh-release@v2

        with:

          files: dist/**/*

          tag_name: ${{ github.event.release.tag_name }}

          overwrite_files: true


