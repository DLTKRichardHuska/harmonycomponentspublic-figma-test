<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        var savedTheme = localStorage.getItem('theme') || 'dark';
        var savedColorTheme = localStorage.getItem('colorTheme') || 'cp';
        if (savedTheme === 'dark') document.documentElement.classList.add('dark');
        document.documentElement.dataset.colorTheme = savedColorTheme;
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overview | Design System (MUI)</title>
    <link rel="icon" type="image/svg+xml" href="/logos/CPVPLogo.svg" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
